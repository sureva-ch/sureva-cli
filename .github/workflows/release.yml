name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

env:
  GORELEASER_VERSION: v2.17.0

jobs:
  release-gate:
    name: Verify and package release candidate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify tag targets current origin/main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --no-tags origin +refs/heads/main:refs/remotes/origin/main

          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          checked_out_commit="$(git rev-parse HEAD)"
          main_commit="$(git rev-parse refs/remotes/origin/main)"

          test "$tag_commit" = "$GITHUB_SHA" || {
            echo "tag commit $tag_commit does not match event SHA $GITHUB_SHA" >&2
            exit 1
          }
          test "$checked_out_commit" = "$GITHUB_SHA" || {
            echo "checked-out commit $checked_out_commit does not match event SHA $GITHUB_SHA" >&2
            exit 1
          }
          test "$tag_commit" = "$main_commit" || {
            echo "tag commit $tag_commit is not current origin/main $main_commit" >&2
            exit 1
          }

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Require public Cognito CLI client ID
        env:
          SUREVA_COGNITO_CLIENT_ID: ${{ vars.SUREVA_COGNITO_CLIENT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUREVA_COGNITO_CLIENT_ID" || {
            echo "SUREVA_COGNITO_CLIENT_ID repository variable is required for release binaries." >&2
            exit 1
          }

      - name: Unit tests
        run: go test ./...

      - name: Build
        run: go build ./...

      - name: Formatting
        shell: bash
        run: test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: go run github.com/golangci/golangci-lint/cmd/golangci-lint@v2.12.2 run ./... --timeout=5m

      - name: Vulnerability scan
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.3.0 ./...

      - name: Build release snapshot
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --snapshot --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SUREVA_COGNITO_CLIENT_ID: ${{ vars.SUREVA_COGNITO_CLIENT_ID }}

      - name: Verify packaged artifacts and checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum --check checksums.txt

          test "$(find . -maxdepth 1 -name 'sureva_*' -type f | wc -l)" -eq 6

          sureva_archive="$(find . -maxdepth 1 -name 'sureva_*_linux_amd64.tar.gz' -type f -print -quit)"
          test -n "$sureva_archive"

          mkdir sureva-smoke
          tar -xzf "$sureva_archive" -C sureva-smoke

          sureva-smoke/sureva version
          sureva-smoke/sureva --help --json | python3 -m json.tool >/dev/null

  release:
    name: Publish release
    needs: release-gate
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out verified tagged commit
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Require public Cognito CLI client ID
        env:
          SUREVA_COGNITO_CLIENT_ID: ${{ vars.SUREVA_COGNITO_CLIENT_ID }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$SUREVA_COGNITO_CLIENT_ID" || {
            echo "SUREVA_COGNITO_CLIENT_ID repository variable is required for publication." >&2
            exit 1
          }

      - name: Preflight Homebrew tap publication access
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail
          test -n "$HOMEBREW_TAP_GITHUB_TOKEN" || {
            echo "HOMEBREW_TAP_GITHUB_TOKEN secret is required to publish the Homebrew cask." >&2
            exit 1
          }

          response_file="$(mktemp)"
          trap 'rm -f "$response_file"' EXIT
          status="$(curl --silent --show-error \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --header "Authorization: Bearer $HOMEBREW_TAP_GITHUB_TOKEN" \
            --header "Accept: application/vnd.github+json" \
            --header "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/sureva-ch/homebrew-tap)"

          test "$status" = "200" || {
            echo "Homebrew tap preflight failed: repository is inaccessible with the publication token (HTTP $status)." >&2
            exit 1
          }

          python3 - "$response_file" <<'PY'
          import json
          import sys

          with open(sys.argv[1], encoding="utf-8") as response:
              repository = json.load(response)

          if repository.get("full_name") != "sureva-ch/homebrew-tap":
              raise SystemExit("Homebrew tap preflight failed: GitHub returned an unexpected repository.")
          if repository.get("permissions", {}).get("push") is not True:
              raise SystemExit("Homebrew tap preflight failed: publication token lacks push permission.")
          PY

      - name: Verify release commit is still current origin/main
        shell: bash
        run: |
          set -euo pipefail
          git fetch --force --no-tags origin +refs/heads/main:refs/remotes/origin/main
          tag_commit="$(git rev-parse "${GITHUB_REF_NAME}^{commit}")"
          main_commit="$(git rev-parse refs/remotes/origin/main)"
          test "$tag_commit" = "$GITHUB_SHA"
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          test "$tag_commit" = "$main_commit" || {
            echo "origin/main advanced to $main_commit after validation; refusing to publish $tag_commit" >&2
            exit 1
          }

      - name: Release
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: ${{ env.GORELEASER_VERSION }}
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SUREVA_COGNITO_CLIENT_ID: ${{ vars.SUREVA_COGNITO_CLIENT_ID }}

  install-smoke:
    name: Install smoke (${{ matrix.os }})
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - windows-latest

    steps:
      - name: Download and install CLI (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          version="${GITHUB_REF_NAME#v}"
          arch="$(uname -m)"
          case "$arch" in
            x86_64) arch="amd64" ;;
            arm64|aarch64) arch="arm64" ;;
            *)
              echo "unsupported macOS architecture: $arch" >&2
              exit 1
              ;;
          esac

          asset="sureva_${version}_darwin_${arch}.tar.gz"
          install_dir="$RUNNER_TEMP/sureva-install"
          mkdir -p "$install_dir"

          gh release download "$GITHUB_REF_NAME" \
            --repo "$GITHUB_REPOSITORY" \
            --pattern "$asset" \
            --dir "$install_dir"

          tar -xzf "$install_dir/$asset" -C "$install_dir"
          chmod +x "$install_dir/sureva"
          echo "$install_dir" >> "$GITHUB_PATH"

      - name: Verify CLI install (macOS)
        if: runner.os == 'macOS'
        shell: bash
        run: |
          set -euo pipefail

          sureva version
          sureva --help --json > "$RUNNER_TEMP/sureva-help.json"
          python3 -m json.tool "$RUNNER_TEMP/sureva-help.json" >/dev/null

      - name: Download and install CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $version = $env:GITHUB_REF_NAME -replace '^v', ''
          $arch = if ($env:PROCESSOR_ARCHITECTURE -eq "ARM64") { "arm64" } else { "amd64" }
          $asset = "sureva_${version}_windows_${arch}.zip"
          $installDir = Join-Path $env:RUNNER_TEMP "sureva-install"
          New-Item -ItemType Directory -Force -Path $installDir | Out-Null

          gh release download $env:GITHUB_REF_NAME `
            --repo $env:GITHUB_REPOSITORY `
            --pattern $asset `
            --dir $installDir

          Expand-Archive -Path (Join-Path $installDir $asset) -DestinationPath $installDir -Force
          Add-Content -Path $env:GITHUB_PATH -Value $installDir

      - name: Verify CLI install (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          sureva.exe version
          sureva.exe --help --json | ConvertFrom-Json | Out-Null

  homebrew-smoke:
    name: Homebrew smoke
    needs: release
    runs-on: macos-latest

    steps:
      - name: Install CLI from Homebrew tap
        run: |
          set -euo pipefail

          brew install --cask sureva-ch/tap/sureva
          sureva version
          sureva --help --json > "$RUNNER_TEMP/sureva-help.json"
          python3 -m json.tool "$RUNNER_TEMP/sureva-help.json" >/dev/null
